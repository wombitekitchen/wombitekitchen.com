<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wombite Kitchen</title>
  <style>
    :root { --bg: #FFFDF7; --text: #2C2C2C; --accent: #A67C52; --muted: #6B6B6B; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { text-align: center; max-width: 400px; }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 2rem; line-height: 1.6; }
    .links { display: flex; flex-direction: column; gap: 0.75rem; }
    .links a { color: var(--accent); text-decoration: none; font-size: 1rem; padding: 0.75rem 1.5rem; border: 1px solid var(--accent); border-radius: 8px; transition: all 0.2s; }
    .links a:hover { background: var(--accent); color: white; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🐻</div>
    <h1>Wombite Kitchen</h1>
    <p>The Wombat Way to Cook</p>
    <div class="links">
      <a href="privacy.html">Datenschutzerklärung</a>
      <a href="terms.html">Nutzungsbedingungen</a>
      <a href="imprint.html">Impressum</a>
    </div>
  </div>
</body>
</html>
