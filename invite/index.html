<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einladung - Wombite Kitchen</title>
  <style>
    :root { --bg: #FFFDF7; --text: #2C2C2C; --accent: #A67C52; --muted: #6B6B6B; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem; }
    .card { text-align: center; max-width: 400px; }
    .logo { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; color: var(--accent); margin-bottom: 0.5rem; }
    p { color: var(--muted); margin-bottom: 1.5rem; line-height: 1.6; }
    .btn { display: inline-block; color: white; background: var(--accent); text-decoration: none; font-size: 1rem; padding: 0.75rem 2rem; border-radius: 8px; transition: all 0.2s; margin-bottom: 0.75rem; }
    .btn:hover { opacity: 0.9; }
    .stores { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem; }
    .stores a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    .stores a:hover { text-decoration: underline; }
  </style>
  <script>
    // Try to open the app directly via custom scheme
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code') || window.location.pathname.split('/').filter(Boolean).pop();
    if (code && code.length >= 6) {
      window.location.href = 'wombite://invite/' + code;
    }
  </script>
</head>
<body>
  <div class="card">
    <div class="logo">🐻</div>
    <h1>Du wurdest eingeladen!</h1>
    <p>Jemand hat ein Kochbuch oder eine Einkaufsliste mit dir geteilt.</p>
    <a class="btn" href="javascript:void(0)" onclick="
      var p = new URLSearchParams(window.location.search);
      var c = p.get('code') || window.location.pathname.split('/').filter(Boolean).pop();
      if (c) window.location.href = 'wombite://invite/' + c;
    ">In der App anzeigen</a>
    <div class="stores">
      <a href="https://apps.apple.com/app/wombite-kitchen/id6742692580">App Store</a>
      <a href="https://play.google.com/store/apps/details?id=com.wombite.app">Google Play</a>
    </div>
  </div>
</body>
</html>
